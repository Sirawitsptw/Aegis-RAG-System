version: '3.8'

services:
  backend-ai:
    build: ./backend
    container_name: backend_fastapi_ai
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env

  frontend-web:
    build: ./frontend
    container_name: frontend_nextjs_ai
    ports:
      - "3000:3000"
    depends_on:
      - backend-ai 